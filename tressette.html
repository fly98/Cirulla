<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tressette">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<meta name="theme-color" content="#0b4d2c">
<title>Tressette · FlyGames</title>
<style>
:root{
  --oro:#e8c266;
  --carta:#fdfaf3;
  --testo:#1c2b22;
  --ombra:0 4px 10px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  background:#06301b;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:#fff;
  display:flex;flex-direction:column;
  padding:env(safe-area-inset-top) 8px env(safe-area-inset-bottom);
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;
  top:-90px; left:-40px; right:-40px; bottom:-90px;
  background:#06301b url('cards/tavolo.jpg') center/cover no-repeat;
  z-index:-1;
}
header{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;gap:8px}
h1{font-size:17px;margin:0;letter-spacing:2px;font-weight:700;color:var(--oro)}
h1 small{display:block;font-size:9px;letter-spacing:1px;color:#cfe8d8;font-weight:400}
.punti{display:flex;gap:6px;font-size:11px}
.chip{background:rgba(0,0,0,.28);border-radius:10px;padding:5px 9px;text-align:center;line-height:1.25}
.chip b{display:block;font-size:15px;color:var(--oro)}
.btn{
  background:var(--oro);color:#2b2110;border:0;border-radius:9px;
  padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:var(--ombra);
}
.btn:disabled{opacity:.35;pointer-events:none;box-shadow:none}
.btn.ghost{background:rgba(255,255,255,.14);color:#fff;box-shadow:none;font-weight:600}
.btn-big{font-size:17px;padding:13px 20px;width:100%;margin-top:4px}

.zona{margin:4px 0}
.etichetta{font-size:10px;letter-spacing:1.5px;color:#9fd3b5;text-transform:uppercase;margin:2px 4px}
.cpu-hand{display:flex;gap:4px;justify-content:center;min-height:110px;align-items:center;flex-wrap:wrap}
.retro{
  width:62px;height:104px;border-radius:7px;
  background:#e9e6dc url('cards/dorso.jpg') center/cover no-repeat;
  border:2px solid #f0e0c0;box-shadow:var(--ombra);
}
.banco{
  display:flex;gap:24px;justify-content:center;align-items:center;
  min-height:220px;padding:12px 8px;
  background:rgba(0,0,0,.14);border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
}
.slot{width:120px;height:202px;border-radius:9px;border:1.5px dashed rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;position:relative}
.mazzetto{position:relative;width:74px;height:124px;flex:0 0 auto}
.mazzetto .retro{width:100%;height:100%;position:absolute;left:0;top:0}
.mazzetto .retro:nth-child(2){left:3px;top:-3px}
.mazzetto .conta{
  position:absolute;top:-12px;right:-10px;z-index:2;
  background:var(--oro);color:#2b2110;font-size:13px;font-weight:800;
  border-radius:11px;padding:3px 9px;box-shadow:var(--ombra);
}
.mazzetto.vuoto{opacity:.25}
.slot .chi{position:absolute;top:-16px;left:0;right:0;text-align:center;font-size:9px;letter-spacing:1.5px;color:#9fd3b5}
.mano{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;min-height:200px;align-items:flex-end;padding:6px 0 2px}

.carta{
  width:112px;height:189px;border-radius:9px;background:#fff;color:var(--testo);
  box-shadow:var(--ombra);position:relative;cursor:pointer;overflow:hidden;
  border:1px solid #d8cfb8;transition:transform .12s, box-shadow .12s;
  user-select:none;
}
.carta .face{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none}
.carta.small{width:112px;height:189px}
.mano .carta:active{transform:translateY(-6px)}
.carta.gioca{animation:pulse .8s ease-in-out infinite}
.carta.nolegal{opacity:.45;filter:saturate(.5)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 2px rgba(255,255,255,.35),var(--ombra)}50%{box-shadow:0 0 0 5px rgba(232,194,102,.55),var(--ombra)}}
.carta.flying{cursor:default;pointer-events:none}
.presa-evid{box-shadow:0 0 0 5px #59d98a,0 0 22px 8px rgba(89,217,138,.7),var(--ombra)!important;transform:translateY(-8px);transition:box-shadow .25s,transform .25s}

.msg{
  min-height:34px;text-align:center;font-size:13px;padding:7px 10px;
  background:rgba(0,0,0,.25);border-radius:10px;margin:4px 0;line-height:1.35;
}
.msg .ok{color:#8ff0b0;font-weight:700}

.footer{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 2px 12px;font-size:11px;color:#bfe0cd}

.bussata{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);
  background:#12492f;border:2px solid var(--oro);border-radius:16px;
  padding:22px 30px;z-index:70;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.6);
  opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;
  max-width:80vw;
}
.bussata.on{opacity:1;transform:translate(-50%,-50%) scale(1)}
.bussata .pugno{font-size:44px;line-height:1;margin-bottom:8px}
.bussata .titolo{font-size:20px;font-weight:800;color:var(--oro);letter-spacing:1px;margin-bottom:4px}
.bussata .dett{font-size:14px;color:#ddefe4}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
.overlay.on{display:flex}
.card-modal{
  background:#12492f;border:1px solid rgba(232,194,102,.4);border-radius:16px;
  padding:22px;max-width:560px;width:100%;max-height:88vh;overflow:auto;box-shadow:var(--ombra);
}
.card-modal h2{margin:0 0 12px;font-size:24px;color:var(--oro)}
table{width:100%;border-collapse:collapse;font-size:16px;margin-bottom:14px}
th,td{padding:9px 6px;text-align:left;border-bottom:1px solid rgba(255,255,255,.12)}
th{color:#9fd3b5;font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:1px}
td.n{text-align:right;font-variant-numeric:tabular-nums;font-size:17px}
.tot{font-weight:800;color:var(--oro)}
.tot.big td{font-size:20px;padding:11px 6px}
tr.evid td{color:var(--oro);font-weight:700;background:rgba(232,194,102,.10)}
.regole{font-size:13.5px;line-height:1.6;color:#ddefe4}
.regole li{margin-bottom:6px}

@media (max-width: 540px){
  body{padding:calc(env(safe-area-inset-top) + 6px) 4px env(safe-area-inset-bottom)}
  header{padding:4px 2px}
  h1{font-size:13px;letter-spacing:1px}
  h1 small{font-size:7px}
  .chip{padding:3px 6px;font-size:9px;border-radius:7px}
  .chip b{font-size:12px}
  .btn{padding:6px 9px;font-size:11px}
  .zona{margin:2px 0}
  .etichetta{font-size:8px;margin:1px 3px}
  .cpu-hand{gap:3px;min-height:62px}
  .retro{width:34px;height:57px;border-radius:4px;border-width:1px}
  .banco{gap:14px;min-height:150px;padding:8px 4px;border-radius:10px}
  .slot{width:80px;height:135px}
  .mazzetto{width:46px;height:78px}
  .mazzetto .conta{font-size:10px;padding:2px 6px;top:-9px;right:-8px}
  .mano{gap:5px;min-height:250px}
  .carta{width:calc((100vw - 38px)/5);max-width:78px;height:auto;aspect-ratio:0.59;border-radius:6px}
  .carta.small{width:78px;height:132px}
  .msg{min-height:26px;font-size:11px;padding:5px 7px;margin:2px 0}
  .footer{font-size:9px;padding:4px 2px 8px}
  .bussata{padding:16px 20px}
  .bussata .pugno{font-size:34px}
  .bussata .titolo{font-size:16px}
  .bussata .dett{font-size:12px}
  .card-modal{padding:14px;max-height:90vh}
  .card-modal h2{font-size:19px}
  table{font-size:13.5px}
  th,td{padding:7px 4px}
  td.n{font-size:14.5px}
  .tot.big td{font-size:16px}
  .btn-big{font-size:15px;padding:11px 14px}
}
@media (max-width: 540px) and (display-mode: standalone){
  body{padding-top:max(calc(env(safe-area-inset-top) + 6px), 54px)}
}
</style>
</head>
<body>

<header>
  <h1>TRESSETTE<small>spizzichino · a 31</small></h1>
  <div class="punti">
    <div class="chip">TU<b id="pTu">0</b></div>
    <div class="chip">CPU<b id="pCpu">0</b></div>
    <div class="chip">TALLONE<b id="pTallone">20</b></div>
  </div>
  <div style="display:flex;gap:6px">
    <button class="btn" id="btnNuova">Nuova</button>
    <button class="btn ghost" id="btnMenu">☰</button>
    <button class="btn ghost" id="btnRegole">?</button>
  </div>
</header>

<div class="zona">
  <div class="etichetta">CPU · <span id="cpuInfo">—</span></div>
  <div class="cpu-hand" id="cpuHand"></div>
</div>

<div class="zona">
  <div class="etichetta">Banco</div>
  <div class="banco" id="banco">
    <div class="mazzetto" id="mazzetto"><div class="retro"></div><div class="retro"></div><div class="conta" id="contaTallone">20</div></div>
    <div class="slot" id="slotCpu"><div class="chi">CPU</div></div>
    <div class="slot" id="slotTu"><div class="chi">TU</div></div>
  </div>
</div>

<div class="msg" id="msg">Tocca <b>Nuova</b> per cominciare.</div>

<div class="zona">
  <div class="etichetta">La tua mano · <span id="tuInfo">—</span></div>
  <div class="mano" id="mano"></div>
</div>

<div class="footer">
  <span id="statoPrese">Prese: tu 0 · cpu 0</span>
</div>

<div class="overlay" id="overlay">
  <div class="card-modal" id="modalBody"></div>
</div>

<div class="bussata" id="bussata">
  <div class="pugno">📣</div>
  <div class="titolo" id="busTitolo"></div>
  <div class="dett" id="busDett"></div>
</div>

<script>
'use strict';

/* ============ MODELLO ============ */
const SEMI = [
  {k:'d', nome:'Denari'},
  {k:'c', nome:'Coppe'},
  {k:'s', nome:'Spade'},
  {k:'b', nome:'Bastoni'}
];
const RANK_NOME  = {1:'Asso',2:'Due',3:'Tre',4:'Quattro',5:'Cinque',6:'Sei',7:'Sette',8:'Fante',9:'Cavallo',10:'Re'};
// gerarchia tressette: 3 > 2 > A > R > C > F > 7 > 6 > 5 > 4
const FORZA = {3:10, 2:9, 1:8, 10:7, 9:6, 8:5, 7:4, 6:3, 5:2, 4:1};
// punti in terzi: asso=3 terzi (1 punto), 2/3/figure=1 terzo
const TERZI = {1:3, 2:1, 3:1, 8:1, 9:1, 10:1, 4:0, 5:0, 6:0, 7:0};

let ST = null;
let BUSY = false;
const sleep = ms => new Promise(r=>setTimeout(r, ms));
const rectOf = el => el.getBoundingClientRect();
const semeOf = k => SEMI.find(x=>x.k===k);
const nomeCarta = c => `${RANK_NOME[c.v]} di ${semeOf(c.s).nome}`;

function nuovoMazzo(){
  const m = [];
  let id = 0;
  for(const s of SEMI) for(let v=1; v<=10; v++) m.push({id:id++, v, s:s.k});
  for(let i=m.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [m[i],m[j]]=[m[j],m[i]]; }
  return m;
}

/* ============ PARTITA / SMAZZATA ============ */
function nuovaPartita(){
  let liv = 'medio';
  try{ liv = localStorage.getItem('tressette_livello') || 'medio'; }catch(e){}
  ST = {
    tot:{tu:0,cpu:0},
    mazziere:'cpu',
    fine:false,
    fortunaTot:0,
    smazzate:0,
    livello: liv
  };
  document.getElementById('pTu').textContent=0;
  document.getElementById('pCpu').textContent=0;
  nuovaSmazzata();
}

function nuovaSmazzata(){
  BUSY = false;
  const mazzo = nuovoMazzo();
  const primo = (ST.mazziere==='cpu') ? 'tu' : 'cpu';
  ST.d = {
    tallone: mazzo,
    mani:{tu:[],cpu:[]},
    prese:{tu:[],cpu:[]},
    banco:[],                 // [{p, carta}] carte della presa in corso
    turno: primo,
    primoDiMano: primo,
    ultimaPresa: null,
    accuse:{tu:[],cpu:[]},    // [{txt, punti}]
    accusate:{tu:[],cpu:[]},  // chiavi già dichiarate
    fortuna:0,
    fortunaLog:[]
  };
  for(let i=0;i<10;i++){
    ST.d.mani[primo].push(ST.d.tallone.shift());
    ST.d.mani[primo==='tu'?'cpu':'tu'].push(ST.d.tallone.shift());
  }
  // fortuna della distribuzione: assi ricevuti (attesi 2 a testa)
  const assiTu = ST.d.mani.tu.filter(c=>c.v===1).length;
  const assiCpu = ST.d.mani.cpu.filter(c=>c.v===1).length;
  if(assiTu-assiCpu !== 0) addFortuna((assiTu-assiCpu)*0.5, `Assi alla distribuzione: ${assiTu} a te, ${assiCpu} alla CPU (${assiTu>assiCpu?'+':''}${(assiTu-assiCpu)*0.5})`);

  controllaAccuse('tu');
  controllaAccuse('cpu');
  render();
  setMsg(primo==='tu' ? 'Tocca a te: gioca una carta.' : 'Apre la CPU.');
  if(ST.d.turno==='cpu') setTimeout(turnoCpu, 900);
}

/* ============ ACCUSE (buongiochi) ============ */
function addFortuna(delta, txt){
  const d = ST.d;
  if(!d) return;
  d.fortuna += delta;
  d.fortunaLog.push({delta, txt});
}

let busTimer = null;
function mostraAccusa(titolo, dettaglio){
  const el = document.getElementById('bussata');
  document.getElementById('busTitolo').textContent = titolo;
  document.getElementById('busDett').textContent = dettaglio;
  el.classList.add('on');
  clearTimeout(busTimer);
  busTimer = setTimeout(()=> el.classList.remove('on'), 2800);
}

function controllaAccuse(p){
  const d = ST.d;
  const mano = d.mani[p];
  const chi = p==='tu' ? 'Accusi' : 'La CPU accusa';

  // napoletana: A+2+3 dello stesso seme
  for(const s of SEMI){
    const key = 'nap:'+s.k;
    if(d.accusate[p].includes(key)) continue;
    const has = [1,2,3].every(v => mano.some(c=>c.v===v && c.s===s.k));
    if(has){
      d.accusate[p].push(key);
      d.accuse[p].push({txt:`Napoletana di ${s.nome}`, punti:3});
      addFortuna(p==='tu'?3:-3, `Napoletana di ${s.nome} ${p==='tu'?'tua':'della CPU'} (+3)`);
      mostraAccusa(`${chi}: Napoletana!`, `Asso, Due e Tre di ${s.nome} → 3 punti`);
    }
  }
  // tre o quattro carte uguali tra assi, due, tre
  for(const v of [1,2,3]){
    const key = 'set:'+v;
    if(d.accusate[p].includes(key)) continue;
    const n = mano.filter(c=>c.v===v).length;
    if(n>=3){
      d.accusate[p].push(key);
      const punti = (n===4)?4:3;
      const nome = v===1?'assi':(v===2?'due':'tre');
      d.accuse[p].push({txt:`${n===4?'Quattro':'Tre'} ${nome}`, punti});
      addFortuna(p==='tu'?punti:-punti, `${n===4?'Quattro':'Tre'} ${nome} ${p==='tu'?'tuoi':'della CPU'} (+${punti})`);
      mostraAccusa(`${chi}: ${n===4?'quattro':'tre'} ${nome}!`, `Buongioco da ${punti} punti`);
    }
  }
}

/* ============ REGOLE DI GIOCO ============ */
function faseObbligo(){ return ST.d.tallone.length===0; }

function carteLegali(p){
  const d = ST.d;
  const mano = d.mani[p];
  if(!faseObbligo() || d.banco.length===0) return mano.slice();
  const semeUscita = d.banco[0].carta.s;
  const stessoSeme = mano.filter(c=>c.s===semeUscita);
  return stessoSeme.length ? stessoSeme : mano.slice();
}

function vinceBanco(){
  const d = ST.d;
  const [a, b] = d.banco;
  if(b.carta.s === a.carta.s){
    return FORZA[b.carta.v] > FORZA[a.carta.v] ? b.p : a.p;
  }
  return a.p; // seme diverso: prende chi ha aperto
}

/* ============ ANIMAZIONI ============ */
function styleAsClone(el, rect, z){
  el.classList.add('flying');
  el.style.position='fixed';
  el.style.left=rect.left+'px';
  el.style.top=rect.top+'px';
  el.style.width=rect.width+'px';
  el.style.height=rect.height+'px';
  el.style.margin='0';
  el.style.zIndex=String(z);
  el.style.transition='none';
  return el;
}
function animateTo(el, rect, ms=380, delay=0){
  return new Promise(resolve=>{
    setTimeout(()=>{
      void el.offsetWidth;
      el.style.transition = `left ${ms}ms cubic-bezier(.28,.6,.35,1), top ${ms}ms cubic-bezier(.28,.6,.35,1), width ${ms}ms cubic-bezier(.28,.6,.35,1), height ${ms}ms cubic-bezier(.28,.6,.35,1), opacity ${ms}ms linear`;
      requestAnimationFrame(()=>{
        el.style.left = rect.left+'px';
        el.style.top = rect.top+'px';
        if(rect.width)  el.style.width  = rect.width+'px';
        if(rect.height) el.style.height = rect.height+'px';
        if('opacity' in rect) el.style.opacity = rect.opacity;
      });
      let done=false;
      const finish=()=>{ if(done) return; done=true; resolve(); };
      el.addEventListener('transitionend', finish, {once:true});
      setTimeout(finish, ms+120);
    }, delay);
  });
}

async function animaGiocataSlot(p, carta){
  try{
    const slot = document.getElementById(p==='tu'?'slotTu':'slotCpu');
    const sRect = rectOf(slot);
    const sourceEl = (p==='tu')
      ? document.querySelector(`#mano .carta[data-id="${carta.id}"]`)
      : document.querySelector('#cpuHand .retro');
    if(!sourceEl) return;
    const fromRect = rectOf(sourceEl);
    sourceEl.style.visibility='hidden';
    const clone = cartaEl(carta,'small');
    styleAsClone(clone, fromRect, 62);
    document.body.appendChild(clone);
    await animateTo(clone, {left:sRect.left+4, top:sRect.top+5, width:sRect.width-8, height:sRect.height-10}, 380);
    clone.remove();
  }catch(e){}
}

// La pescata è pubblica: la carta si mostra scoperta, poi vola nella mano di chi l'ha pescata
async function animaPescata(p, carta){
  try{
    const mz = document.getElementById('mazzetto');
    const from = rectOf(mz);
    const clone = cartaEl(carta,'small');
    styleAsClone(clone, {left:from.left, top:from.top, width:from.width, height:from.height}, 66);
    document.body.appendChild(clone);
    // si mostra scoperta accanto al mazzetto, dal lato di chi pesca
    const banco = rectOf(document.getElementById('banco'));
    const compact = window.matchMedia('(max-width: 540px)').matches;
    const w = compact? 84:116, hh = compact? 142:196;
    const showTop = (p==='tu') ? banco.top + banco.height - hh - 6 : banco.top + 6;
    await animateTo(clone, {left: banco.left + (compact?56:104), top: showTop, width:w, height:hh}, 320);
    await sleep(1200);
    const zona = document.getElementById(p==='tu'?'mano':'cpuHand');
    const z = rectOf(zona);
    await animateTo(clone, {left:z.left+z.width/2-28, top:(p==='tu'? z.top+16 : z.top), width:56, height:95, opacity:'0'}, 380);
    clone.remove();
  }catch(e){}
}

async function animaPresaBanco(vincitore){
  try{
    const els = document.querySelectorAll('.slot .carta');
    els.forEach(el=>el.classList.add('presa-evid'));
    await sleep(1300);
    const zona = document.getElementById(vincitore==='tu' ? 'mano' : 'cpuHand');
    const zRect = rectOf(zona);
    const target = (vincitore==='tu')
      ? { left:zRect.left+zRect.width/2-26, top:zRect.bottom+20, width:52, height:88, opacity:'0' }
      : { left:zRect.left+zRect.width/2-26, top:zRect.top-100, width:52, height:88, opacity:'0' };
    const clones = Array.from(els).map((el,i)=>{
      const r = rectOf(el);
      el.style.visibility='hidden';
      const cl = el.cloneNode(true);
      cl.classList.remove('presa-evid');
      styleAsClone(cl, r, 61+i);
      document.body.appendChild(cl);
      return cl;
    });
    await Promise.all(clones.map((cl,i)=> animateTo(cl, target, 420, i*50)));
    clones.forEach(c=>c.remove());
  }catch(e){}
}

/* ============ FLUSSO DI GIOCO ============ */
async function gioca(p, carta){
  if(BUSY) return;
  const d = ST.d;
  if(d.turno!==p || ST.fine) return;
  const legali = carteLegali(p);
  if(!legali.some(c=>c.id===carta.id)){
    if(p==='tu') setMsg(`Devi rispondere a <b>${semeOf(d.banco[0].carta.s).nome}</b>.`);
    return;
  }
  BUSY = true;

  d.mani[p] = d.mani[p].filter(c=>c.id!==carta.id);
  if(d.pescateNote) d.pescateNote[p] = d.pescateNote[p].filter(id=>id!==carta.id);
  await animaGiocataSlot(p, carta);
  d.banco.push({p, carta});
  d.turno = (p==='tu')?'cpu':'tu';
  render();

  if(d.banco.length<2){
    setMsg(`${p==='tu'?'Giochi':'CPU gioca'} ${nomeCarta(carta)}.`);
    BUSY = false;
    salvaPartita();
    if(d.turno==='cpu') setTimeout(turnoCpu, 750);
    return;
  }

  // presa completa
  const vinc = vinceBanco();
  setMsg(`${p==='tu'?'Giochi':'CPU gioca'} ${nomeCarta(carta)}. <span class="ok">${vinc==='tu'?'Prendi tu!':'Prende la CPU.'}</span>`);
  await animaPresaBanco(vinc);
  d.prese[vinc].push(d.banco[0].carta, d.banco[1].carta);
  d.banco = [];
  d.ultimaPresa = vinc;

  // pesca dal tallone: prima il vincitore — la pescata è PUBBLICA (si mostra a entrambi)
  if(d.tallone.length){
    const perd = (vinc==='tu')?'cpu':'tu';
    const cartaV = d.tallone.shift();
    const cartaP = d.tallone.shift();
    if(!d.pescateNote) d.pescateNote = {tu:[], cpu:[]};

    render();
    setMsg(`${vinc==='tu'?'Peschi':'La CPU pesca'} <b>${nomeCarta(cartaV)}</b>…`);
    await animaPescata(vinc, cartaV);
    d.mani[vinc].push(cartaV);
    d.pescateNote[vinc].push(cartaV.id);
    render();

    setMsg(`${perd==='tu'?'Peschi':'La CPU pesca'} <b>${nomeCarta(cartaP)}</b>.`);
    await animaPescata(perd, cartaP);
    d.mani[perd].push(cartaP);
    d.pescateNote[perd].push(cartaP.id);

    if(cartaV.v===1) addFortuna(vinc==='tu'?0.5:-0.5, `Asso pescato ${vinc==='tu'?'da te':'dalla CPU'} (+0.5)`);
    if(cartaP.v===1) addFortuna(perd==='tu'?0.5:-0.5, `Asso pescato ${perd==='tu'?'da te':'dalla CPU'} (+0.5)`);
    controllaAccuse(vinc);
    controllaAccuse(perd);
    if(d.tallone.length===0) setMsg('Tallone esaurito: da ora <b>obbligo di rispondere al seme</b>.');
  }

  d.turno = vinc;
  d.primoDiMano = vinc;
  render();
  salvaPartita();

  if(d.mani.tu.length===0 && d.mani.cpu.length===0){
    BUSY = false;
    setTimeout(fineSmazzata, 800);
    return;
  }
  BUSY = false;
  if(d.turno==='cpu') setTimeout(turnoCpu, 850);
}

/* ============ IA — tre livelli ============ */
function turnoCpu(){
  const d = ST.d;
  if(!d || d.turno!=='cpu' || ST.fine || BUSY) return;
  if(!d.mani.cpu.length) return;
  const liv = ST.livello || 'medio';
  const legali = carteLegali('cpu');
  let carta;
  if(liv==='facile') carta = legali[(Math.random()*legali.length)|0];
  else if(liv==='difficile') carta = scegliDifficile(legali);
  else carta = scegliMedio(legali);
  gioca('cpu', carta);
}

function terziDi(c){ return TERZI[c.v]; }
const lisce = arr => arr.filter(c=>terziDi(c)===0);

function scegliMedio(legali){
  const d = ST.d;
  if(d.banco.length===0){
    // apre: liscia più bassa; se solo carichi, il meno prezioso
    const l = lisce(legali);
    if(l.length) return l.sort((a,b)=>FORZA[a.v]-FORZA[b.v])[0];
    return legali.sort((a,b)=>terziDi(a)-terziDi(b) || FORZA[a.v]-FORZA[b.v])[0];
  }
  // risponde
  const uscita = d.banco[0].carta;
  const vincenti = legali.filter(c=> c.s===uscita.s && FORZA[c.v]>FORZA[uscita.v]);
  const valePresa = terziDi(uscita)>0 || d.tallone.length===0 && d.mani.cpu.length<=2;
  if(vincenti.length && valePresa){
    return vincenti.sort((a,b)=>FORZA[a.v]-FORZA[b.v])[0]; // vinci col minimo
  }
  if(vincenti.length && lisce(vincenti).length){
    return lisce(vincenti).sort((a,b)=>FORZA[a.v]-FORZA[b.v])[0]; // presa gratis con liscia
  }
  // scarta il minimo
  const l = lisce(legali);
  if(l.length) return l.sort((a,b)=>FORZA[a.v]-FORZA[b.v])[0];
  return legali.sort((a,b)=>terziDi(a)-terziDi(b) || FORZA[a.v]-FORZA[b.v])[0];
}

/* difficile: conta le carte uscite e i semi mancanti dell'avversario */
function carteUscite(){
  const d = ST.d;
  return [...d.prese.tu, ...d.prese.cpu, ...d.banco.map(x=>x.carta)];
}
function fuoriGioco(s, v){ // la carta v di s è già uscita o in mano CPU?
  return carteUscite().some(c=>c.s===s&&c.v===v) || ST.d.mani.cpu.some(c=>c.s===s&&c.v===v);
}
function assoSicuro(s){ // l'asso di s non può più essere battuto
  return fuoriGioco(s,3) && fuoriGioco(s,2);
}
// void dell'avversario, dedotti in fase obbligo
function nemicoVoid(){
  const d = ST.d;
  if(!d.void) d.void = new Set();
  return d.void;
}

function carteNoteNemico(){
  const d = ST.d;
  if(!d.pescateNote) return [];
  const ids = new Set(d.pescateNote.tu);
  return d.mani.tu.filter(c=>ids.has(c.id));
}

function scegliDifficile(legali){
  const d = ST.d;
  const voidSet = nemicoVoid();
  const note = carteNoteNemico();

  if(d.banco.length===0){
    // 1) incassa gli assi sicuri
    const assi = legali.filter(c=>c.v===1 && assoSicuro(c.s));
    if(assi.length) return assi[0];
    // 1b) non aprire in semi dove SO che il nemico ha una carta che mi batte
    const legaliSafe = legali.filter(c => !note.some(n => n.s===c.s && FORZA[n.v]>FORZA[c.v]));
    if(lisce(legaliSafe).length) return lisce(legaliSafe).sort((a,b)=>FORZA[a.v]-FORZA[b.v])[0];
    // 2) incassa 3 quando il 2 conta poco? apri liscia dal seme dove il nemico NON è void
    const l = lisce(legali).filter(c=>!voidSet.has(c.s));
    if(l.length) return l.sort((a,b)=>FORZA[a.v]-FORZA[b.v])[0];
    const l2 = lisce(legali);
    if(l2.length) return l2.sort((a,b)=>FORZA[a.v]-FORZA[b.v])[0];
    // solo carichi: gioca il 3 (imbattibile) prima dell'asso
    return legali.sort((a,b)=>FORZA[b.v]-FORZA[a.v])[0];
  }

  const uscita = d.banco[0].carta;
  const vincenti = legali.filter(c=> c.s===uscita.s && FORZA[c.v]>FORZA[uscita.v]);
  const puntiInPalio = terziDi(uscita);
  const fase2 = d.tallone.length===0;

  if(vincenti.length){
    // prendi se c'è valore, o se la presa è gratis (liscia), o a fine mano per l'ultima presa
    const gratis = lisce(vincenti);
    if(puntiInPalio>0){
      // usa la minima che vince; ma se l'asso è a rischio e ho il 3, meglio il 3
      return vincenti.sort((a,b)=>FORZA[a.v]-FORZA[b.v])[0];
    }
    if(gratis.length) return gratis.sort((a,b)=>FORZA[a.v]-FORZA[b.v])[0];
    if(fase2 && d.mani.cpu.length<=3) return vincenti.sort((a,b)=>FORZA[a.v]-FORZA[b.v])[0]; // finale: conta l'ultima presa
  }
  // non prende: scarta proteggendo i carichi non sicuri
  const scarti = legali.slice().sort((a,b)=>{
    const pa = terziDi(a)*10 + FORZA[a.v] + (a.v===1 && !assoSicuro(a.s) ? 50 : 0);
    const pb = terziDi(b)*10 + FORZA[b.v] + (b.v===1 && !assoSicuro(b.s) ? 50 : 0);
    return pa-pb;
  });
  return scarti[0];
}

/* ============ RENDER ============ */
function cartaEl(c, cls){
  const d = document.createElement('div');
  d.className = 'carta ' + (cls||'');
  d.title = nomeCarta(c);
  d.innerHTML = `<img class="face" src="cards/${c.s}${c.v}.jpg" alt="${nomeCarta(c)}" draggable="false">`;
  d.dataset.id = c.id;
  return d;
}

function render(){
  const d = ST.d;
  document.getElementById('pTallone').textContent = d.tallone.length;
  document.getElementById('contaTallone').textContent = d.tallone.length;
  document.getElementById('mazzetto').classList.toggle('vuoto', d.tallone.length===0);
  document.getElementById('pTu').textContent = ST.tot.tu;
  document.getElementById('pCpu').textContent = ST.tot.cpu;
  const livLabel = {facile:'😴', medio:'🎯', difficile:'🧠'}[ST.livello||'medio'];
  document.getElementById('cpuInfo').textContent = `${livLabel} ${d.mani.cpu.length} carte` + (d.turno==='cpu'?' · tocca a lei':'');
  document.getElementById('tuInfo').textContent  = (d.turno==='tu') ? (faseObbligo()&&d.banco.length? 'rispondi al seme' : 'tocca a te') : 'attendi…';
  document.getElementById('statoPrese').textContent =
    `Prese: tu ${d.prese.tu.length/2|0} · cpu ${d.prese.cpu.length/2|0}` + (faseObbligo()?' — obbligo di seme':'');

  // FLIP mano
  const prima = {};
  document.querySelectorAll('#mano .carta').forEach(el=>{
    if(el.style.visibility!=='hidden') prima[el.dataset.id] = el.getBoundingClientRect();
  });

  const ch = document.getElementById('cpuHand');
  ch.innerHTML='';
  d.mani.cpu.forEach(()=>{ const r=document.createElement('div'); r.className='retro'; ch.appendChild(r); });

  // banco: slot con eventuali carte giocate
  for(const [slotId, chi] of [['slotCpu','cpu'],['slotTu','tu']]){
    const slot = document.getElementById(slotId);
    slot.querySelectorAll('.carta').forEach(e=>e.remove());
    const g = d.banco.find(x=>x.p===chi);
    if(g){
      const e = cartaEl(g.carta,'small');
      e.style.width='calc(100% - 8px)'; e.style.height='calc(100% - 10px)';
      slot.appendChild(e);
    }
  }

  const legali = (d.turno==='tu') ? new Set(carteLegali('tu').map(c=>c.id)) : null;
  const mn = document.getElementById('mano');
  mn.innerHTML='';
  d.mani.tu.slice().sort((a,b)=> a.s===b.s ? FORZA[b.v]-FORZA[a.v] : a.s.localeCompare(b.s)).forEach(c=>{
    let cls = '';
    if(d.turno==='tu'){
      cls = legali.has(c.id) ? 'gioca' : 'nolegal';
    }
    const e = cartaEl(c, cls);
    e.onclick = ()=> gioca('tu', c);
    mn.appendChild(e);
  });

  // FLIP fase 2
  document.querySelectorAll('#mano .carta').forEach(el=>{
    const old = prima[el.dataset.id];
    if(!old){
      el.style.opacity='0';
      requestAnimationFrame(()=>{
        el.style.transition='opacity .3s ease'; el.style.opacity='1';
        setTimeout(()=>{ el.style.transition=''; el.style.opacity=''; }, 360);
      });
      return;
    }
    const now = el.getBoundingClientRect();
    const dx = old.left-now.left, dy = old.top-now.top;
    if(Math.abs(dx)>2||Math.abs(dy)>2){
      el.style.transition='none';
      el.style.transform=`translate(${dx}px,${dy}px)`;
      requestAnimationFrame(()=>{
        el.style.transition='transform .32s ease'; el.style.transform='';
        setTimeout(()=>{ el.style.transition=''; }, 380);
      });
    }
  });

  salvaPartita();
}

function setMsg(html){ document.getElementById('msg').innerHTML = html; }

/* ============ FINE SMAZZATA ============ */
function contaPunti(p){
  const d = ST.d;
  const terzi = d.prese[p].reduce((a,c)=>a+terziDi(c),0);
  const accuse = d.accuse[p].reduce((a,x)=>a+x.punti,0);
  return {
    terzi,
    carte: Math.floor(terzi/3),
    ultima: d.ultimaPresa===p ? 1 : 0,
    accuse
  };
}

function fineSmazzata(){
  const d = ST.d;
  const a = contaPunti('tu'), b = contaPunti('cpu');
  const pt = {tu: a.carte+a.ultima+a.accuse, cpu: b.carte+b.ultima+b.accuse};
  ST.tot.tu += pt.tu;
  ST.tot.cpu += pt.cpu;
  ST.fortunaTot += d.fortuna;
  ST.smazzate++;

  const rigaEvid = (nome,vTu,vCpu)=>`<tr class="evid"><td>${nome}</td><td class="n">${vTu||'—'}</td><td class="n">${vCpu||'—'}</td></tr>`;
  const accTxt = p => d.accuse[p].map(x=>x.txt).join(', ');

  const html = `
   <h2>Fine smazzata</h2>
   <table>
     <tr><th>Punto</th><th class="n">Tu</th><th class="n">CPU</th></tr>
     <tr><td>Carte (${a.terzi}⁄3 vs ${b.terzi}⁄3)</td><td class="n">${a.carte}</td><td class="n">${b.carte}</td></tr>
     <tr><td>Ultima presa</td><td class="n">${a.ultima||'—'}</td><td class="n">${b.ultima||'—'}</td></tr>
     ${(a.accuse||b.accuse)?rigaEvid(`📣 Accuse${accTxt('tu')?' ('+accTxt('tu')+')':''}${accTxt('cpu')?' [CPU: '+accTxt('cpu')+']':''}`, a.accuse, b.accuse):''}
     <tr class="tot"><td>Totale smazzata</td><td class="n">${pt.tu}</td><td class="n">${pt.cpu}</td></tr>
     <tr class="tot big"><td>PARTITA</td><td class="n">${ST.tot.tu}</td><td class="n">${ST.tot.cpu}</td></tr>
   </table>`;

  const sfigaHtml = buildSfiga(d.fortuna, 'Indice di sfiga (questa mano)',
    d.fortunaLog.length ? d.fortunaLog.map(e=>`${e.delta>0?'▲':'▼'} ${e.txt}`).join('<br>') : 'Nessun colpo di fortuna in questa mano.');

  const vinceTu = ST.tot.tu>=31, vinceCpu = ST.tot.cpu>=31;
  let coda;
  if((vinceTu||vinceCpu) && ST.tot.tu!==ST.tot.cpu){
    ST.fine = true;
    registraStorico();
    const esito = ST.tot.tu>ST.tot.cpu ? 'Hai vinto tu! 🏆' : 'Vince la CPU 🤖';
    const sfigaPartita = buildSfiga(ST.fortunaTot, `Indice di sfiga — intera partita (${ST.smazzate} mani)`,
      `Somma della fortuna di tutte le mani: ${ST.fortunaTot>0?'+':''}${Math.round(ST.fortunaTot*10)/10}`);
    coda = `<p class="tot big" style="font-size:24px;margin:10px 0">${esito}</p>` + sfigaPartita +
      `<button class="btn btn-big" onclick="chiudiModal(false);nuovaPartita()">Nuova partita</button>`;
  } else {
    coda = `<button class="btn btn-big" onclick="chiudiModal(true)">Smazzata successiva</button>`;
  }

  document.getElementById('pTu').textContent = ST.tot.tu;
  document.getElementById('pCpu').textContent = ST.tot.cpu;
  apriModal(html + sfigaHtml + coda);
}

function buildSfiga(F, titolo, dettagli){
  let label, emoji;
  if(F>=8){ emoji='🍀🍀🍀'; label='Fortuna sfacciata: così vincerebbe chiunque'; }
  else if(F>=4){ emoji='🍀'; label='La sorte ti ha sorriso'; }
  else if(F>-4){ emoji='⚖️'; label='Sorte neutrale: è stato tutto merito (o demerito)'; }
  else if(F>-8){ emoji='🐈‍⬛'; label='Ti è girata male, poco da dire'; }
  else { emoji='☠️'; label='Sfiga cosmica: nemmeno Fantozzi'; }
  const pos = Math.round((Math.max(-10, Math.min(10, F)) + 10) * 5);
  return `
   <div style="margin:6px 0 14px">
     <div style="font-size:13px;color:#9fd3b5;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px">${titolo}</div>
     <div style="position:relative;height:12px;border-radius:6px;background:linear-gradient(90deg,#3d3d3d,#777 45%,#777 55%,#e8c266)">
       <div style="position:absolute;top:-4px;left:calc(${pos}% - 10px);width:20px;height:20px;border-radius:50%;background:#fdfaf3;border:2px solid #12492f"></div>
     </div>
     <div style="display:flex;justify-content:space-between;font-size:11px;color:#9fd3b5;margin-top:3px"><span>☠️ sfiga</span><span>🍀 fortuna</span></div>
     <div style="font-size:15px;margin-top:7px">${emoji} <b>${label}</b></div>
     <div style="font-size:12.5px;color:#bfe0cd;margin-top:5px;line-height:1.55">${dettagli}</div>
   </div>`;
}

function chiudiModal(prosegui){
  document.getElementById('overlay').classList.remove('on');
  if(prosegui && !ST.fine){
    ST.mazziere = (ST.mazziere==='tu')?'cpu':'tu';
    nuovaSmazzata();
  }
}
function apriModal(html){
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('overlay').classList.add('on');
}

/* ============ SALVATAGGIO E STORICO ============ */
const SAVE_KEY = 'tressette_save_v1';
const HIST_KEY = 'tressette_storico_v1';

function salvaPartita(){
  try{
    if(!ST || ST.fine){ localStorage.removeItem(SAVE_KEY); return; }
    const copia = JSON.parse(JSON.stringify(ST));
    if(copia.d && copia.d.void) delete copia.d.void;
    localStorage.setItem(SAVE_KEY, JSON.stringify(copia));
  }catch(e){}
}
function caricaSalvataggio(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    if(!s || !s.d || s.fine) return null;
    return s;
  }catch(e){ return null; }
}
function riprendiPartita(salvata){
  ST = salvata;
  BUSY = false;
  document.getElementById('overlay').classList.remove('on');
  if(ST.d.mani.tu.length===0 && ST.d.mani.cpu.length===0){
    render(); setTimeout(fineSmazzata, 600); return;
  }
  render();
  setMsg('Partita ripresa: ' + (ST.d.turno==='tu' ? 'tocca a te.' : 'gioca la CPU.'));
  if(ST.d.turno==='cpu') setTimeout(turnoCpu, 900);
}
function registraStorico(){
  try{
    const rec = {
      data: Date.now(),
      tu: ST.tot.tu, cpu: ST.tot.cpu,
      vincitore: ST.tot.tu>ST.tot.cpu ? 'tu' : 'cpu',
      smazzate: ST.smazzate,
      fortuna: Math.round(ST.fortunaTot*10)/10
    };
    const h = JSON.parse(localStorage.getItem(HIST_KEY)||'[]');
    h.unshift(rec);
    if(h.length>50) h.length = 50;
    localStorage.setItem(HIST_KEY, JSON.stringify(h));
    localStorage.removeItem(SAVE_KEY);
  }catch(e){}
}

function setLivello(liv){
  try{ localStorage.setItem('tressette_livello', liv); }catch(e){}
  if(ST) ST.livello = liv;
  salvaPartita();
  render();
  apriMenu();
}

function apriMenu(){
  let h = [];
  try{ h = JSON.parse(localStorage.getItem(HIST_KEY)||'[]'); }catch(e){}
  const vinte = h.filter(r=>r.vincitore==='tu').length;
  const perse = h.length - vinte;
  const fmt = ts => {
    const dd = new Date(ts);
    return `${String(dd.getDate()).padStart(2,'0')}/${String(dd.getMonth()+1).padStart(2,'0')} ${String(dd.getHours()).padStart(2,'0')}:${String(dd.getMinutes()).padStart(2,'0')}`;
  };
  const fEmoji = f => f>=8?'🍀🍀':f>=4?'🍀':f>-4?'⚖️':f>-8?'🐈‍⬛':'☠️';
  const livAttuale = (ST && ST.livello) || (localStorage.getItem('tressette_livello')||'medio');
  const livBtn = (id,label,desc)=>`
    <button class="btn ${livAttuale===id?'':'ghost'}" style="flex:1;flex-direction:column;padding:10px 6px"
      onclick="setLivello('${id}')">
      ${label}<br><span style="font-size:9.5px;font-weight:400;opacity:.85">${desc}</span>
    </button>`;
  const righe = h.length
    ? h.map(r=>`<tr>
        <td>${fmt(r.data)}</td>
        <td>${r.vincitore==='tu'?'🏆':'🤖'}</td>
        <td class="n">${r.tu}–${r.cpu}</td>
        <td class="n">${r.smazzate}</td>
        <td class="n">${fEmoji(r.fortuna)} ${r.fortuna>0?'+':''}${r.fortuna}</td>
      </tr>`).join('')
    : `<tr><td colspan="5" style="color:#9fd3b5">Nessuna partita conclusa finora.</td></tr>`;

  apriModal(`
    <h2>Tressette — menu</h2>
    <div style="font-size:13px;color:#9fd3b5;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Livello CPU</div>
    <div style="display:flex;gap:7px;margin-bottom:16px">
      ${livBtn('facile','😴 Facile','solo le regole')}
      ${livBtn('medio','🎯 Medio','gioca di strategia')}
      ${livBtn('difficile','🧠 Difficile','conta le carte')}
    </div>
    <div style="font-size:15px;margin-bottom:10px">
      Giocate <b>${h.length}</b> · Vinte <b style="color:var(--oro)">${vinte}</b> · Perse <b>${perse}</b>
      ${h.length?` · <span style="color:#9fd3b5">${Math.round(vinte/h.length*100)}% vittorie</span>`:''}
    </div>
    <table>
      <tr><th>Quando</th><th>Esito</th><th class="n">Punti</th><th class="n">Mani</th><th class="n">Sfiga</th></tr>
      ${righe}
    </table>
    <div style="font-size:12px;color:#9fd3b5;margin-bottom:12px">
      💾 La partita si salva da sola a ogni mossa su questo dispositivo.
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn btn-big" onclick="document.getElementById('overlay').classList.remove('on')">Chiudi</button>
      ${h.length?`<button class="btn ghost btn-big" onclick="if(confirm('Cancellare tutto lo storico?')){localStorage.removeItem('${HIST_KEY}');apriMenu();}">🗑 Svuota</button>`:''}
    </div>
    <a href="cirulla.html" style="display:block;text-align:center;color:var(--oro);font-size:14px;text-decoration:none;padding:8px">🎴 Vai a Cirulla →</a>
    <a href="scopa.html" style="display:block;text-align:center;color:var(--oro);font-size:14px;text-decoration:none;padding:8px">🧹 Vai a Scopa →</a>
    <a href="briscola.html" style="display:block;text-align:center;color:var(--oro);font-size:14px;text-decoration:none;padding:8px">🎺 Vai a Briscola →</a>
    <a href="index.html" style="display:block;text-align:center;color:#9fd3b5;font-size:13px;text-decoration:none;padding:4px">🏠 Menu giochi</a>
  `);
}

/* ============ REGOLE ============ */
const REGOLE = `
<h2>Regole (Tressette a 2 · Spizzichino)</h2>
<div class="regole">
<ul>
<li><b>Mazzo 40 carte</b>, 10 a testa, 20 nel tallone. Gerarchia: <b>3 &gt; 2 &gt; Asso &gt; Re &gt; Cavallo &gt; Fante &gt; 7 &gt; 6 &gt; 5 &gt; 4</b>. Non esistono briscole.</li>
<li>Apre chi non è di mazzo. Vince la presa la carta più alta <b>del seme di apertura</b>: se rispondi con un altro seme, non prendi mai.</li>
<li><b>La carta pescata è pubblica</b>: viene mostrata scoperta a entrambi i giocatori prima di entrare in mano. Anche la CPU (a livello difficile) se la ricorda!</li>
<li><b>Finché c'è il tallone</b> puoi giocare qualsiasi carta. Chi prende pesca per primo, poi l'altro, e apre la mano successiva.</li>
<li><b>Tallone esaurito</b>: scatta l'obbligo di rispondere al seme, se ce l'hai (non c'è obbligo di superare).</li>
<li><b>Punti carte</b> (in terzi): Asso = 1 punto; 3, 2, Re, Cavallo e Fante = ⅓ ciascuno; i terzi avanzati si perdono. <b>Ultima presa = 1 punto</b>.</li>
<li><b>Accuse (buongiochi)</b>, dichiarate automaticamente appena le hai in mano: <b>Napoletana</b> (Asso+2+3 dello stesso seme) = 3 punti; <b>tre assi / tre due / tre tre</b> = 3 punti; <b>quattro</b> = 4 punti. Ogni combinazione si accusa una sola volta.</li>
<li>Vince chi arriva per primo a <b>31 punti</b> (buongiochi compresi) a fine smazzata; a pari punti si continua.</li>
</ul>
</div>
<button class="btn" onclick="document.getElementById('overlay').classList.remove('on')">Chiudi</button>`;

/* ============ AVVIO ============ */
function avvio(){
  const salvata = caricaSalvataggio();
  if(salvata){
    apriModal(`
      <h2>Partita in corso trovata</h2>
      <div style="font-size:16px;margin-bottom:14px">
        Punteggio <b style="color:var(--oro)">${salvata.tot.tu}–${salvata.tot.cpu}</b> dopo ${salvata.smazzate} man${salvata.smazzate===1?'o':'i'} complete.<br>
        <span style="font-size:13px;color:#9fd3b5">Vuoi riprenderla da dove l'avevi lasciata?</span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-big" id="btnRiprendi">▶︎ Riprendi</button>
        <button class="btn ghost btn-big" id="btnScarta">Nuova partita</button>
      </div>
    `);
    document.getElementById('btnRiprendi').onclick = ()=> riprendiPartita(salvata);
    document.getElementById('btnScarta').onclick = ()=>{
      localStorage.removeItem(SAVE_KEY);
      document.getElementById('overlay').classList.remove('on');
      nuovaPartita();
    };
  } else {
    nuovaPartita();
  }
}

document.getElementById('btnMenu').onclick = apriMenu;
document.getElementById('btnRegole').onclick = ()=> apriModal(REGOLE);
document.getElementById('btnNuova').onclick = ()=>{ nuovaPartita(); };
document.getElementById('overlay').onclick = e=>{
  if(e.target.id==='overlay') document.getElementById('overlay').classList.remove('on');
};

avvio();
</script>
</body>
