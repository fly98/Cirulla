<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 610">
  <defs>
    <!-- texture del bordo: macchioline irregolari bianche su nero -->
    <pattern id="pebble" width="26" height="26" patternUnits="userSpaceOnUse">
      <rect width="26" height="26" fill="#111"/>
      <g fill="#f5f2ea">
        <path d="M3 4 q3 -3 5 0 q2 3 -1 4 q-4 1 -4 -4z"/>
        <path d="M14 2 q4 -1 4 3 q0 3 -3 3 q-3 -1 -1 -6z"/>
        <path d="M22 9 q3 1 2 4 q-2 3 -4 1 q-2 -3 2 -5z"/>
        <path d="M6 13 q4 -2 5 1 q1 4 -3 4 q-4 -1 -2 -5z"/>
        <path d="M17 15 q3 -2 5 1 q1 3 -2 4 q-4 0 -3 -5z"/>
        <path d="M2 20 q3 -2 5 1 q1 3 -2 3 q-4 0 -3 -4z"/>
        <path d="M12 22 q3 -2 4 1 q1 3 -2 3 q-3 -1 -2 -4z"/>
        <path d="M23 21 q3 0 2 3 q-1 2 -3 1 q-2 -2 1 -4z"/>
      </g>
    </pattern>

    <!-- un quadrante di ornamento: volute e fiore -->
    <g id="quadrante">
      <!-- voluta grande -->
      <path d="M10 10 C 70 5, 120 25, 130 75 C 136 108, 118 130, 95 128 C 78 126, 70 112, 76 100 C 81 90, 94 90, 97 99 C 99 105, 94 110, 89 108"
            fill="none" stroke="#f5f2ea" stroke-width="7" stroke-linecap="round"/>
      <!-- gambo secondario -->
      <path d="M12 60 C 40 70, 62 95, 60 135 C 59 160, 45 175, 30 172"
            fill="none" stroke="#f5f2ea" stroke-width="6" stroke-linecap="round"/>
      <!-- fiore a otto petali -->
      <g transform="translate(112 46)">
        <g fill="#f5f2ea">
          <ellipse rx="7" ry="17" transform="rotate(0)"/>
          <ellipse rx="7" ry="17" transform="rotate(45)"/>
          <ellipse rx="7" ry="17" transform="rotate(90)"/>
          <ellipse rx="7" ry="17" transform="rotate(135)"/>
        </g>
        <circle r="6" fill="#111"/>
        <circle r="3" fill="#f5f2ea"/>
      </g>
      <!-- fiorellino sul gambo -->
      <g transform="translate(52 150)">
        <g fill="#f5f2ea">
          <ellipse rx="5" ry="12" transform="rotate(20)"/>
          <ellipse rx="5" ry="12" transform="rotate(65)"/>
          <ellipse rx="5" ry="12" transform="rotate(110)"/>
          <ellipse rx="5" ry="12" transform="rotate(155)"/>
        </g>
        <circle r="4" fill="#111"/>
      </g>
      <!-- fogliette -->
      <path d="M30 28 q14 -2 16 12 q-14 2 -16 -12z" fill="#f5f2ea"/>
      <path d="M28 100 q12 -6 18 6 q-12 6 -18 -6z" fill="#f5f2ea"/>
      <!-- giglio centrale verso l'asse -->
      <path d="M148 8 q-6 26 0 44 q3 -10 8 -14 q-2 12 0 20 q4 -8 10 -10 q-4 10 -2 22"
            fill="none" stroke="#f5f2ea" stroke-width="5" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- fondo -->
  <rect x="0" y="0" width="360" height="610" rx="18" fill="#111"/>

  <!-- bordo texturizzato -->
  <rect x="0" y="0" width="360" height="610" rx="18" fill="url(#pebble)"/>
  <!-- pannello interno nero -->
  <rect x="34" y="34" width="292" height="542" fill="#111"/>
  <!-- doppia cornice bianca -->
  <rect x="34" y="34" width="292" height="542" fill="none" stroke="#f5f2ea" stroke-width="4"/>
  <rect x="44" y="44" width="272" height="522" fill="none" stroke="#f5f2ea" stroke-width="1.6"/>

  <!-- ornamenti: quadrante replicato in simmetria speculare (4 angoli) -->
  <g transform="translate(52 52)">
    <use href="#quadrante"/>
  </g>
  <g transform="translate(308 52) scale(-1 1)">
    <use href="#quadrante"/>
  </g>
  <g transform="translate(52 558) scale(1 -1)">
    <use href="#quadrante"/>
  </g>
  <g transform="translate(308 558) scale(-1 -1)">
    <use href="#quadrante"/>
  </g>

  <!-- fascia centrale con il nome, dritto e specchiato come nei dorsi classici -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="bold" letter-spacing="7" fill="#f5f2ea" text-anchor="middle">
    <path d="M120 300 h-46 m212 0 h-46" stroke="#f5f2ea" stroke-width="2"/>
    <text x="180" y="296">FLYGAMES</text>
    <text x="180" y="314" transform="rotate(180 180 314)">FLYGAMES</text>
    <path d="M180 300 l-10 5 10 5 10 -5 z" fill="#f5f2ea"/>
  </g>
</svg>
